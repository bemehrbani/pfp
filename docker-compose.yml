version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pfp_campaign
      POSTGRES_USER: pfp_user
      POSTGRES_PASSWORD: pfp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://pfp_user:pfp_password@postgres:5432/pfp_campaign
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: development-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info
    environment:
      DATABASE_URL: postgres://pfp_user:pfp_password@postgres:5432/pfp_campaign
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: development-secret-key-change-in-production
      DJANGO_SETTINGS_MODULE: config.settings.development
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat --loglevel=info
    environment:
      DATABASE_URL: postgres://pfp_user:pfp_password@postgres:5432/pfp_campaign
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: development-secret-key-change-in-production
      DJANGO_SETTINGS_MODULE: config.settings.development
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    command: python bot.py --mode polling
    environment:
      DATABASE_URL: postgres://pfp_user:pfp_password@postgres:5432/pfp_campaign
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: development-secret-key-change-in-production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DJANGO_API_URL: http://backend:8000/api
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./telegram-bot:/app
      - ./backend:/app/backend  # Mount entire backend directory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
##
# PFP Campaign Manager — Staging Mode (Isolated ports)
# Usage: docker-compose -p pfp-staging -f docker-compose.production.yml -f docker-compose.staging.yml up -d --build
##

version: '3.8'

services:
  postgres:
    ports:
      - "5434:5432"

  redis:
    ports:
      - "6381:6379"

  backend:
    ports:
      - "8002:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-staging.rule=Host(`${DOMAIN_NAME}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/swagger`) || PathPrefix(`/redoc`) || PathPrefix(`/static`) || PathPrefix(`/media`) || PathPrefix(`/health`))"
      - "traefik.http.routers.backend-staging.entrypoints=websecure"
      - "traefik.http.routers.backend-staging.tls.certresolver=le"
      - "traefik.http.services.backend-staging.loadbalancer.server.port=8000"

  telegram-bot:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.telegram-bot-staging.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/bot-webhook`)"
      - "traefik.http.routers.telegram-bot-staging.entrypoints=websecure"
      - "traefik.http.routers.telegram-bot-staging.tls.certresolver=le"
      - "traefik.http.services.telegram-bot-staging.loadbalancer.server.port=8443"

  frontend:
    ports:
      - "8082:80"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pfp_campaign}
      POSTGRES_USER: ${POSTGRES_USER:-pfp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pfp_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/backups:/backups
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pfp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pfp-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pfp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pfp_user}:${POSTGRES_PASSWORD:-pfp_password}@postgres:5432/${POSTGRES_DB:-pfp_campaign}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pfp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN_NAME}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/swagger`) || PathPrefix(`/redoc`) || PathPrefix(`/static`) || PathPrefix(`/media`) || PathPrefix(`/ws`) || PathPrefix(`/health`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pfp_user}:${POSTGRES_PASSWORD:-pfp_password}@postgres:5432/${POSTGRES_DB:-pfp_campaign}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pfp-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    command: celery -A config beat --loglevel=info
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pfp_user}:${POSTGRES_PASSWORD:-pfp_password}@postgres:5432/${POSTGRES_DB:-pfp_campaign}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pfp-network

  telegram-bot:
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pfp_user}:${POSTGRES_PASSWORD:-pfp_password}@postgres:5432/${POSTGRES_DB:-pfp_campaign}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DJANGO_API_URL: http://backend:8000/api
      DJANGO_SETTINGS_MODULE: config.settings.production
      VIDEO_ASSETS_DIR: /app/assets/videos
    volumes:
      - ./telegram-bot/logs:/app/logs
      - ./minab/music:/app/assets/videos:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - pfp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.telegram-bot.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/bot-webhook`)"
      - "traefik.http.routers.telegram-bot.entrypoints=websecure"
      - "traefik.http.routers.telegram-bot.tls.certresolver=le"
      - "traefik.http.services.telegram-bot.loadbalancer.server.port=8443"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
    ports:
      - "8080:80"
    volumes:
      - ./frontend/logs:/app/logs
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pfp-network
    # Note: Host Nginx handles TLS/routing, proxies to port 8080

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  pfp-network:
    driver: bridge
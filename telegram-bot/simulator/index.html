<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFP Bot Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-chat: #0e1621;
            --bg-header: #17212b;
            --bg-input: #17212b;
            --bg-bot: #182533;
            --bg-user: #2b5278;
            --text-primary: #f5f5f5;
            --text-secondary: #7b8ea0;
            --accent: #5eb5f7;
            --accent-hover: #73c1f9;
            --border: #1e2c3a;
            --inline-btn-bg: rgba(94, 181, 247, 0.12);
            --inline-btn-text: #5eb5f7;
            --keyboard-btn-bg: #2b3d4f;
            --keyboard-btn-text: #e0e8ef;
            --success: #50c878;
            --warning: #f5a623;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0f16;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .simulator-container {
            width: 420px;
            max-width: 100%;
            height: 85vh;
            max-height: 740px;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border);
        }

        /* Header */
        .chat-header {
            background: var(--bg-header);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .chat-header .info {
            flex: 1;
        }

        .chat-header .info .name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-header .info .status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .chat-header .reset-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .chat-header .reset-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--accent);
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            background: var(--bg-chat);
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Message bubbles */
        .message {
            max-width: 88%;
            margin-bottom: 8px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            margin-right: auto;
        }

        .message.user {
            margin-left: auto;
        }

        .message .bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.bot .bubble {
            background: var(--bg-bot);
            border-bottom-left-radius: 4px;
        }

        .message.user .bubble {
            background: var(--bg-user);
            border-bottom-right-radius: 4px;
        }

        .message .bubble strong {
            font-weight: 600;
        }

        .message .bubble code {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'SF Mono', monospace;
        }

        .message .time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 3px;
            padding: 0 4px;
        }

        .message.user .time {
            text-align: right;
        }

        /* Inline buttons (inside messages) */
        .inline-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .inline-buttons .row {
            display: flex;
            gap: 6px;
        }

        .inline-btn {
            flex: 1;
            padding: 9px 12px;
            background: var(--inline-btn-bg);
            border: none;
            border-radius: 8px;
            color: var(--inline-btn-text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .inline-btn:hover {
            background: rgba(94, 181, 247, 0.22);
            transform: translateY(-1px);
        }

        .inline-btn:active {
            transform: translateY(0);
        }

        .inline-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Reply keyboard (bottom) */
        .keyboard-area {
            background: var(--bg-input);
            border-top: 1px solid var(--border);
            padding: 10px;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .keyboard-btn {
            padding: 12px 8px;
            background: var(--keyboard-btn-bg);
            border: none;
            border-radius: 10px;
            color: var(--keyboard-btn-text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .keyboard-btn:hover {
            background: rgba(94, 181, 247, 0.18);
            color: var(--accent);
        }

        .keyboard-btn.full-width {
            grid-column: span 2;
        }

        /* Input area */
        .input-area {
            background: var(--bg-input);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--accent);
        }

        .input-area input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn svg {
            fill: #fff;
            width: 18px;
            height: 18px;
        }

        /* Step indicator */
        .step-indicator {
            background: var(--bg-header);
            padding: 6px 18px;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            border-top: 1px solid var(--border);
            letter-spacing: 0.3px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 14px;
        }

        .typing-indicator .dot {
            width: 7px;
            height: 7px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        /* Day divider */
        .day-divider {
            text-align: center;
            margin: 12px 0;
        }

        .day-divider span {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="simulator-container">
        <div class="chat-header">
            <div class="avatar">☮️</div>
            <div class="info">
                <div class="name">PFP Campaign Bot</div>
                <div class="status">bot • online</div>
            </div>
            <button class="reset-btn" onclick="resetSimulator()">↺ Reset</button>
        </div>

        <div class="chat-messages" id="messages"></div>

        <div id="keyboard-container"></div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Type a message..."
                onkeypress="if(event.key==='Enter') sendUserMessage()">
            <button class="send-btn" onclick="sendUserMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>

        <div class="step-indicator" id="stepIndicator">Step 0 / 8 — Send /start to begin</div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const keyboardEl = document.getElementById('keyboard-container');
        const inputEl = document.getElementById('msgInput');
        const stepEl = document.getElementById('stepIndicator');

        let currentStep = 0;
        const totalSteps = 9;

        function scrollToBottom() {
            setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 50);
        }

        function getTime() {
            return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function addMessage(text, type = 'bot', inlineButtons = null) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;

            let html = text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<strong>$1</strong>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/\\n/g, '<br>')
                .replace(/\n/g, '<br>');

            msg.innerHTML = `
    <div class="bubble">${html}${inlineButtons ? renderInlineButtons(inlineButtons) : ''}</div>
    <div class="time">${getTime()}</div>
  `;

            messagesEl.appendChild(msg);
            scrollToBottom();
            return msg;
        }

        function renderInlineButtons(buttons) {
            let html = '<div class="inline-buttons">';
            for (const row of buttons) {
                html += '<div class="row">';
                for (const btn of row) {
                    const escapedAction = btn.action.replace(/'/g, "\\'");
                    html += `<button class="inline-btn" onclick="handleInlineClick('${escapedAction}')">${btn.label}</button>`;
                }
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function showTyping() {
            const el = document.createElement('div');
            el.className = 'message bot';
            el.id = 'typing';
            el.innerHTML = `<div class="bubble"><div class="typing-indicator">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div></div>`;
            messagesEl.appendChild(el);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        function setKeyboard(buttons) {
            if (!buttons || buttons.length === 0) {
                keyboardEl.innerHTML = '';
                return;
            }
            let html = '<div class="keyboard-area"><div class="keyboard-grid">';
            for (const btn of buttons) {
                const fw = btn.fullWidth ? ' full-width' : '';
                html += `<button class="keyboard-btn${fw}" onclick="handleKeyboardClick('${btn.action}')">${btn.label}</button>`;
            }
            html += '</div></div>';
            keyboardEl.innerHTML = html;
        }

        function updateStep(n, desc) {
            currentStep = n;
            stepEl.textContent = `Step ${n} / ${totalSteps} — ${desc}`;
        }

        // ─── Task Data (mirrors production DB) ────────────────────────

        const TASKS = [
            { id: 9, type: 'twitter_comment', icon: '\u{1F4AC}', title: "Comment on Key Tweets Against Trump's War", desc: 'Reply to key tweets by world leaders and organizations demanding Trump be held accountable.', instructions: '1. Pick a key tweet from the list\n2. Write a direct, impactful reply\n3. Post your reply and paste the URL below', time: 5 },
            { id: 10, type: 'twitter_comment', icon: '\u{1F4AC}', title: 'Comment on Key Tweets Against Iran', desc: 'Find and reply to tweets spreading misinformation against Iran, countering them with facts.', instructions: '1. Search for tweets spreading misinformation\n2. Reply with facts and evidence\n3. Paste your reply URL below', time: 10 },
            { id: 11, type: 'twitter_post', icon: '\u{1F426}', title: 'Tweet with #IstandwithIran', desc: 'Post a tweet with campaign hashtags to amplify the message of solidarity with Iran.', instructions: '1. Choose or write a tweet\n2. Include #IstandwithIran and #StopTrumpMadness\n3. Post it and paste your tweet URL below', time: 5 },
            { id: 12, type: 'twitter_retweet', icon: '\u{1F501}', title: 'Retweet Campaign Content', desc: 'Retweet at least 3 impactful posts with our campaign hashtags to spread the message.', instructions: '1. Search Twitter for #StopTrumpMadness\n2. Retweet at least 3 posts\n3. Paste a screenshot or URL below', time: 2 },
            { id: 13, type: 'petition', icon: '\u270D\uFE0F', title: 'Sign the Petition', desc: 'Sign the international petition demanding Trump be held accountable and Iran receives reparations.', instructions: '1. Open the petition link\n2. Fill in your name and email\n3. Submit and take a screenshot as proof', time: 15 },
            { id: 14, type: 'mass_email', icon: '\u{1F4E7}', title: 'Mass Emails to Organizations', desc: 'Send pre-written emails to key organizations, influencers, and media outlets demanding action.', instructions: '1. Copy the email template\n2. Send to the listed organizations\n3. Take a screenshot of sent emails as proof', time: 30 },
            { id: 8, type: 'content_creation', icon: '\u270D\uFE0F', title: 'Write a Personal Peace Statement', desc: 'Write a personal statement about why peace matters to you and share it on social media.', instructions: '1. Write 2-3 paragraphs about peace\n2. Share on your social media of choice\n3. Paste the URL below', time: 15 },
            { id: 7, type: 'telegram_invite', icon: '\u{1F465}', title: 'Invite a Volunteer to Join', desc: 'Invite at least one friend or family member to join the People for Peace campaign.', instructions: '1. Share the bot link with someone\n2. Help them join the campaign\n3. Tell us their username below', time: 15 },
            { id: 6, type: 'telegram_share', icon: '\u{1F4E2}', title: 'Share Peace Message on Telegram', desc: 'Share one of our pre-written peace messages in your Telegram groups or channels.', instructions: '1. Pick a message from the list\n2. Share it in 3+ Telegram groups\n3. Take a screenshot as proof', time: 15 },
            { id: 5, type: 'twitter_retweet', icon: '\u{1F501}', title: 'Retweet Campaign Content (Alt)', desc: 'Search for and retweet campaign hashtag content to increase visibility.', instructions: '1. Search for #TrumpOwesIran tweets\n2. Retweet at least 3 impactful ones\n3. Paste any retweet URL below', time: 15 },
            { id: 4, type: 'twitter_post', icon: '\u{1F426}', title: 'Tweet for StopTrumpMadness', desc: 'Post a powerful tweet demanding Trump stop his unlawful war on Iran.', instructions: '1. Choose a ready-made tweet or write your own\n2. Include @realDonaldTrump @POTUS @WhiteHouse\n3. Use #StopTrumpMadness #TrumpOwesIran\n4. Post and paste your tweet URL below', time: 5 },
        ];

        let activeTaskId = null;

        // ─── Conversation Flow ─────────────────────────────────────────

        function sendUserMessage() {
            const text = inputEl.value.trim();
            if (!text) return;
            inputEl.value = '';

            if (text === '/start' && currentStep === 0) {
                addMessage('/start', 'user');
                updateStep(1, 'Language picker shown');
                showTyping();
                setTimeout(() => { removeTyping(); step1_languagePicker(); }, 800);
            } else if (currentStep === 7 && (text.startsWith('https://x.com/') || text.startsWith('https://twitter.com/') || text.length > 10)) {
                addMessage(text, 'user');
                updateStep(8, 'Proof submitted');
                showTyping();
                setTimeout(() => { removeTyping(); step8_proofSubmitted(text); }, 1200);
            } else {
                addMessage(text, 'user');
                showTyping();
                setTimeout(() => {
                    removeTyping();
                    addMessage("Type /start or use the buttons to navigate the flow.");
                }, 500);
            }
        }

        function handleInlineClick(action) {
            if (action === 'lang_en') {
                addMessage('English', 'user');
                updateStep(2, 'Welcome message shown');
                showTyping();
                setTimeout(() => { removeTyping(); step2_welcome(); }, 800);
            } else if (action === 'view_tasks_1') {
                addMessage('View Tasks', 'user');
                updateStep(4, 'Task list for campaign');
                showTyping();
                setTimeout(() => { removeTyping(); step4_taskList(); }, 800);
            } else if (action.startsWith('task_detail_')) {
                const taskId = parseInt(action.split('_')[2]);
                const task = TASKS.find(t => t.id === taskId);
                addMessage(task ? task.title : 'Task', 'user');
                updateStep(5, 'Task detail view');
                showTyping();
                setTimeout(() => { removeTyping(); step5_taskDetail(taskId); }, 800);
            } else if (action.startsWith('task_start_')) {
                const taskId = parseInt(action.split('_')[2]);
                addMessage('Let\'s Go!', 'user');
                updateStep(6, 'Task guidance');
                activeTaskId = taskId;
                showTyping();
                setTimeout(() => { removeTyping(); step6_guidedFlow(taskId); }, 1000);
            } else if (action === 'confirm_submit') {
                addMessage('Confirm Submission', 'user');
                updateStep(9, 'Complete!');
                showTyping();
                setTimeout(() => { removeTyping(); step8_confirmed(); }, 1000);
            } else if (action === 'back_to_campaigns') {
                addMessage('Browse Campaigns', 'user');
                updateStep(3, 'Campaign list');
                showTyping();
                setTimeout(() => { removeTyping(); step3_campaignList(); }, 800);
            } else if (action === 'back_to_tasks') {
                addMessage('Back to Tasks', 'user');
                updateStep(4, 'Task list');
                showTyping();
                setTimeout(() => { removeTyping(); step4_taskList(); }, 800);
            }
        }

        function handleKeyboardClick(action) {
            switch (action) {
                case 'campaigns':
                    addMessage('Browse Campaigns', 'user');
                    updateStep(3, 'Campaign list');
                    showTyping();
                    setTimeout(() => { removeTyping(); step3_campaignList(); }, 800);
                    break;
                case 'tasks':
                    addMessage('Available Tasks', 'user');
                    updateStep(4, 'Task list');
                    showTyping();
                    setTimeout(() => { removeTyping(); step4_taskList(); }, 800);
                    break;
                case 'progress':
                    addMessage('My Progress', 'user');
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage("*Your Progress*\n\n\u2705 Completed: 0 tasks\n\u{1F4CB} Active: 0 tasks\n\nJoin a campaign and complete tasks!");
                    }, 600);
                    break;
                case 'leaderboard':
                    addMessage('Leaderboard', 'user');
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage("*Top Volunteers*\n\n1. \u{1F947} Volunteer A\n2. \u{1F948} Volunteer B\n3. \u{1F949} Volunteer C\n\nKeep going to climb the ranks!");
                    }, 600);
                    break;
                case 'help':
                    addMessage('Help', 'user');
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage("*People for Peace — Help*\n\n*Commands:*\n/start - Start the bot\n/campaigns - List campaigns\n/tasks - Available tasks\n/mytasks - Your tasks\n/profile - Your profile\n/leaderboard - Top volunteers\n\n*How to Participate:*\n1. Browse campaigns\n2. Join a campaign\n3. Click a task to see details\n4. Start and complete tasks\n5. Submit proof");
                    }, 600);
                    break;
                case 'language':
                    addMessage('Language', 'user');
                    showTyping();
                    setTimeout(() => { removeTyping(); step1_languagePicker(); }, 600);
                    break;
            }
        }

        // ─── Step Implementations ─────────────────────────────────────

        function step1_languagePicker() {
            addMessage('Choose your language:', 'bot', [
                [
                    { label: 'English', action: 'lang_en' },
                    { label: '\u0641\u0627\u0631\u0633\u06CC', action: 'lang_en' },
                    { label: '\u0627\u0644\u0639\u0631\u0628\u064A\u0629', action: 'lang_en' },
                ]
            ]);
        }

        function step2_welcome() {
            addMessage("Language set to *English*.");
            setTimeout(() => {
                addMessage(
                    "Welcome to *People for Peace Campaign Manager*!\n\n" +
                    "I'm your assistant for participating in peace campaigns.\n\n" +
                    "\u2022 Browse available campaigns\n" +
                    "\u2022 Claim and complete tasks\n" +
                    "\u2022 Track your progress\n" +
                    "\u2022 Collaborate with other volunteers\n\n" +
                    "Use the menu below to get started!"
                );
                setKeyboard([
                    { label: 'Browse Campaigns', action: 'campaigns' },
                    { label: 'Available Tasks', action: 'tasks' },
                    { label: 'My Progress', action: 'progress' },
                    { label: 'Leaderboard', action: 'leaderboard' },
                    { label: 'Help', action: 'help' },
                    { label: 'Language', action: 'language' },
                ]);
            }, 400);
        }

        function step3_campaignList() {
            addMessage(
                "*Available Campaigns*\n\n" +
                "\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\n" +
                "*#StopTrumpMadness \u2014 Hold Trump Accountable*\n\n" +
                "Join the global movement demanding Trump stop his unlawful war on Iran.\n\n" +
                "Members: 42\n" +
                "Tasks: " + TASKS.length + " available\n" +
                "Joined",
                'bot',
                [
                    [{ label: 'View Tasks', action: 'view_tasks_1' }]
                ]
            );
        }

        function step4_taskList() {
            const buttons = TASKS.map(task => ([{
                label: `${task.icon} ${task.title.length > 28 ? task.title.substring(0, 28) + '...' : task.title} \u2014 \u23F1 ${task.time} min`,
                action: `task_detail_${task.id}`
            }]));

            addMessage(
                "*Tasks for #StopTrumpMadness*\n\n" +
                "Tap a task to see details.\n\n" +
                "\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501",
                'bot',
                buttons
            );
        }

        function step5_taskDetail(taskId) {
            const task = TASKS.find(t => t.id === taskId);
            if (!task) return;

            addMessage(
                `${task.icon} *${task.title}*\n\n` +
                `${task.desc}\n\n` +
                `\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n` +
                `*Instructions*\n` +
                `${task.instructions}\n\n` +
                `\u23F1 *Duration:* ${task.time} min\n` +
                `500 spots remaining`,
                'bot',
                [
                    [{ label: "Let's Go!", action: `task_start_${task.id}` }],
                    [{ label: 'Back to Tasks', action: 'back_to_tasks' }]
                ]
            );
            updateStep(5, `Task detail \u2014 ${task.title.substring(0, 25)}`);
        }

        function step6_guidedFlow(taskId) {
            const task = TASKS.find(t => t.id === taskId);
            if (!task) return;

            if (task.type === 'twitter_post') {
                addMessage(
                    "*Task Started!*\n\n" +
                    `${task.icon} *${task.title}*\n\n` +
                    "*3 easy steps:*\n\n" +
                    "1. Pick a tweet or write your own\n" +
                    "2. Post it on Twitter/X\n" +
                    "3. Paste the URL here\n\n" +
                    "\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n" +
                    "1. \"Trump started this war with no justification. Iran demands accountability. #StopTrumpMadness\"\n\n" +
                    "2. \"Enough is enough. Trump's war on Iran is unlawful aggression. #StopTrumpMadness\"\n\n" +
                    "3. \"Iranian families deserve compensation for Trump's madness. Justice will prevail. #StopTrumpMadness\"\n\n" +
                    "\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n" +
                    "*When done, paste your tweet URL below*\n" +
                    "(e.g. https://x.com/yourname/status/123...)\n\n" +
                    "Type /cancel to cancel."
                );
            } else if (task.type === 'twitter_retweet') {
                addMessage(
                    "*Task Started!*\n\n" +
                    `${task.icon} *${task.title}*\n\n` +
                    "*3 easy steps:*\n\n" +
                    "1. Search for #StopTrumpMadness tweets\n" +
                    "2. Retweet at least 3 impactful posts\n" +
                    "3. Paste a URL or screenshot below\n\n" +
                    "*When done, paste your link below*\n\n" +
                    "Type /cancel to cancel."
                );
            } else if (task.type === 'twitter_comment') {
                addMessage(
                    "*Task Started!*\n\n" +
                    `${task.icon} *${task.title}*\n\n` +
                    "*3 easy steps:*\n\n" +
                    "1. Pick a key tweet to reply to\n" +
                    "2. Write a thoughtful, impactful reply\n" +
                    "3. Paste your reply URL below\n\n" +
                    "*Key tweets to comment on:*\n\n" +
                    "1. *United Nations* (@UN)\n" +
                    "2. *UNHCR* (@Refugees)\n" +
                    "3. *UNICEF* (@UNICEF)\n" +
                    "4. *Ant\u00F3nio Guterres* (@antonioguterres)\n" +
                    "5. *Al Jazeera English* (@AJEnglish)\n\n" +
                    "*When done, paste your reply URL below*\n\n" +
                    "Type /cancel to cancel."
                );
            } else {
                addMessage(
                    "*Task Started!*\n\n" +
                    `${task.icon} *${task.title}*\n\n` +
                    `*Instructions:*\n${task.instructions}\n\n` +
                    "*When done, send your proof below*\n" +
                    "(URL, screenshot, or description)\n\n" +
                    "Type /cancel to cancel."
                );
            }

            setKeyboard([]);
            updateStep(7, 'Waiting for proof');
            inputEl.placeholder = 'Paste your proof URL here...';
        }

        function step8_proofSubmitted(url) {
            addMessage(
                "*Proof Submission Review*\n\n" +
                "Please confirm your submission:\n\n" +
                url,
                'bot',
                [
                    [
                        { label: 'Confirm Submission', action: 'confirm_submit' },
                        { label: 'Cancel', action: 'back_to_campaigns' },
                    ]
                ]
            );
        }

        function step8_confirmed() {
            addMessage(
                "*Proof Submitted Successfully!*\n\n" +
                "*Status:* Pending Review\n\n" +
                "Your proof has been submitted for review by the campaign manager.\n" +
                "You'll be notified once it's verified. Great work!"
            );
            inputEl.placeholder = 'Type a message...';
            setKeyboard([
                { label: 'Browse Campaigns', action: 'campaigns' },
                { label: 'Available Tasks', action: 'tasks' },
                { label: 'My Progress', action: 'progress' },
                { label: 'Leaderboard', action: 'leaderboard' },
                { label: 'Help', action: 'help' },
                { label: 'Language', action: 'language' },
            ]);
        }

        function resetSimulator() {
            messagesEl.innerHTML = '';
            keyboardEl.innerHTML = '';
            inputEl.placeholder = 'Type /start to begin...';
            inputEl.value = '';
            currentStep = 0;
            activeTaskId = null;
            updateStep(0, 'Send /start to begin');

            const div = document.createElement('div');
            div.className = 'day-divider';
            div.innerHTML = '<span>Today</span>';
            messagesEl.appendChild(div);
        }

        // Initialize
        resetSimulator();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Campaign Team — People For Peace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-primary: #0f172a;
  --bg-card: #1e293b;
  --gold: #c9a84c;
  --gold-light: #e8d48b;
  --gold-dim: rgba(201,168,76,0.15);
  --red-accent: #8b2232;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --white: #ffffff;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(201,168,76,0.05) 0%, transparent 50%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

.gate-container {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 440px;
  width: 100%;
  padding: 0 24px;
  animation: fadeUp 0.8s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.gate-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 18px;
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.gate-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 24px;
  border: 2px solid rgba(59,130,246,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  background: rgba(59,130,246,0.06);
}
h1 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
}
.gate-subtitle {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 36px;
  line-height: 1.5;
}
.gold-rule {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
  margin: 0 auto 32px;
  border: none;
}
.input-group {
  position: relative;
  margin-bottom: 20px;
}
.input-group input {
  width: 100%;
  padding: 16px 20px;
  font-family: var(--font-body);
  font-size: 16px;
  background: var(--bg-card);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 10px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  letter-spacing: 1px;
}
.input-group input::placeholder {
  color: var(--text-muted);
  letter-spacing: 0;
}
.input-group input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.enter-btn {
  width: 100%;
  padding: 16px;
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  letter-spacing: 0.5px;
}
.enter-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(59,130,246,0.3);
}
.enter-btn:active { transform: translateY(0); }
.error-msg {
  color: #f87171;
  font-size: 14px;
  margin-top: 12px;
  opacity: 0;
  transition: opacity 0.3s;
}
.error-msg.visible { opacity: 1; }
.gate-footer {
  margin-top: 48px;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 1px;
}
.gate-footer a {
  color: var(--gold);
  text-decoration: none;
}
</style>
</head>
<body>
<div class="gate-container">
  <div class="gate-badge">☮ People For Peace</div>
  <div class="gate-icon">👥</div>
  <h1>Campaign Team</h1>
  <p class="gate-subtitle">Internal team portal<br>For authorized volunteers and team members</p>
  <hr class="gold-rule">
  <form id="gateForm" onsubmit="return handleSubmit(event)">
    <div class="input-group">
      <input type="password" id="passInput" placeholder="Enter team access code" autocomplete="off" autofocus>
    </div>
    <button type="submit" class="enter-btn">Enter Team Portal</button>
    <p class="error-msg" id="errorMsg">Incorrect access code. Please try again.</p>
  </form>
  <div class="gate-footer">
    <a href="https://peopleforpeace.live">peopleforpeace.live</a>
  </div>
</div>

<script>
const HASH = 'a563332e89ead5908b69274bb3266666b6387594c2c5e92038d83eafc07cfb81';

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function handleSubmit(e) {
  e.preventDefault();
  const input = document.getElementById('passInput').value;
  const hash = await sha256(input);
  if (hash === HASH) {
    sessionStorage.setItem('pfp_campaign_token', hash);
    sessionStorage.setItem('pfp_campaign_ts', Date.now().toString());
    window.location.href = 'hub.html';
  } else {
    const err = document.getElementById('errorMsg');
    err.classList.add('visible');
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
    setTimeout(() => err.classList.remove('visible'), 3000);
  }
}

// If already authenticated, skip gate
if (sessionStorage.getItem('pfp_campaign_token') === HASH) {
  window.location.href = 'hub.html';
}
</script>
</body>
</html>

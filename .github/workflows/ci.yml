name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pfp_campaign_test
          POSTGRES_USER: pfp_user
          POSTGRES_PASSWORD: pfp_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install coverage django-coverage-plugin

    - name: Run backend tests
      env:
        DATABASE_URL: postgres://pfp_user:pfp_password@localhost:5432/pfp_campaign_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        DEBUG: "True"
        ALLOWED_HOSTS: localhost,127.0.0.1
        CELERY_BROKER_URL: redis://localhost:6379/0
        CELERY_RESULT_BACKEND: redis://localhost:6379/0
      run: |
        cd backend
        python manage.py test --noinput --verbosity=2

    - name: Run backend tests with coverage
      env:
        DATABASE_URL: postgres://pfp_user:pfp_password@localhost:5432/pfp_campaign_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        DEBUG: "True"
        ALLOWED_HOSTS: localhost,127.0.0.1
        CELERY_BROKER_URL: redis://localhost:6379/0
        CELERY_RESULT_BACKEND: redis://localhost:6379/0
      run: |
        cd backend
        coverage run manage.py test --noinput
        coverage report
        coverage xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: backend/coverage.xml
        flags: backend
        name: backend-coverage

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci --legacy-peer-deps

    - name: Run frontend tests
      working-directory: frontend
      run: npm test -- --watchAll=false --passWithNoTests
      env:
        CI: true
        REACT_APP_API_URL: http://localhost:8000/api

    - name: Build frontend
      working-directory: frontend
      run: npm run build
      env:
        REACT_APP_API_URL: http://localhost:8000/api

  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        docker-compose -f docker-compose.yml build

    - name: Run Docker Compose tests
      run: |
        docker-compose -f docker-compose.yml up -d
        sleep 30  # Wait for services to start
        docker-compose ps
        docker-compose logs backend

        # Run health checks
        curl -f http://localhost:8001/health/simple || docker-compose logs backend
        curl -f http://localhost:3000 || docker-compose logs frontend

        # Run backend tests in Docker
        docker-compose exec -T backend python manage.py test --noinput

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run bandit security scan (Python)
      run: |
        pip install bandit
        bandit -r backend/ -f json -o bandit-report.json || true

    - name: Run npm audit (Node.js)
      working-directory: frontend
      run: npm audit --audit-level=high || true

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [backend-tests, frontend-build, docker-build, security-scan]
    steps:
    - name: Deploy Preview
      run: |
        echo "Deploy preview would be triggered here for PR #${{ github.event.pull_request.number }}"
        echo "URL: https://pr-${{ github.event.pull_request.number }}.preview.example.com"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-tests, frontend-build, docker-build, security-scan]
    environment:
      name: production
      url: https://yourdomain.com
    env:
      POSTGRES_DB: pfp_campaign_test
      POSTGRES_USER: pfp_user
      POSTGRES_PASSWORD: pfp_password
      SECRET_KEY: test-secret-key-for-production-validation
      DEBUG: False
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      TELEGRAM_BOT_TOKEN: dummy-token
      TELEGRAM_WEBHOOK_URL: https://example.com/bot-webhook
      DOMAIN_NAME: localhost
      ACME_EMAIL: test@example.com
      REACT_APP_API_URL: http://localhost/api
    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Build production Docker images
      run: |
        docker-compose -f docker-compose.production.yml build

    - name: Test production configuration (without Traefik)
      run: |
        # Start only core services (postgres, redis, backend, celery, frontend) without reverse-proxy
        docker-compose -f docker-compose.production.yml up -d postgres redis backend celery celery-beat frontend
        sleep 45  # Wait for services to start

        # Check service status
        docker-compose -f docker-compose.production.yml ps

        # Check backend health
        docker-compose -f docker-compose.production.yml exec -T backend curl -f http://localhost:8000/health/simple || docker-compose -f docker-compose.production.yml logs backend

        # Check frontend container is running
        docker-compose -f docker-compose.production.yml exec -T frontend wget -q --spider http://localhost:80 || docker-compose -f docker-compose.production.yml logs frontend

        # Run basic backend tests in production configuration
        docker-compose -f docker-compose.production.yml exec -T backend python manage.py test apps.users.tests.UserModelTests --noinput 2>&1 | head -50

        # Clean up
        docker-compose -f docker-compose.production.yml down -v

    - name: Validate production configuration files
      run: |
        echo "Checking production configuration files..."
        test -f docker-compose.production.yml || { echo "docker-compose.production.yml missing"; exit 1; }
        test -f backend/Dockerfile.production || { echo "backend/Dockerfile.production missing"; exit 1; }
        test -f frontend/Dockerfile.production || { echo "frontend/Dockerfile.production missing"; exit 1; }
        test -f telegram-bot/Dockerfile.production || { echo "telegram-bot/Dockerfile.production missing"; exit 1; }
        test -f deploy.sh || { echo "deploy.sh missing"; exit 1; }
        echo "All production configuration files present"
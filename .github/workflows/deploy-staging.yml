name: Deploy Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/pfp-staging
            git pull origin dev
            
            # Ensure .env.staging is used as .env and .env.production
            if [ -f .env.staging ]; then
                cp .env.staging .env.production
                cp .env.staging .env
            fi
            
            # Restart docker containers for staging
            docker-compose -p pfp-staging -f docker-compose.production.yml -f docker-compose.staging.yml up -d --build
            
            # Apply migrations
            docker exec pfp-staging-backend-1 python manage.py migrate
            docker exec pfp-staging-backend-1 python manage.py collectstatic --noinput

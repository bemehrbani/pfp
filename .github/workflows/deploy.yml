name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true

jobs:
  deploy:
    name: Deploy to SkinScope Server
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY'
    environment:
      name: production
      url: https://peopleforpeace.live

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          echo "=== Capturing current state for rollback ==="
          PREV_COMMIT=$($SSH_CMD "cd /opt/pfp && git rev-parse HEAD 2>/dev/null || echo 'none'")
          echo "Previous commit: $PREV_COMMIT"
          echo "PREV_COMMIT=$PREV_COMMIT" >> $GITHUB_ENV

          echo "=== Pre-deploy database backup ==="
          $SSH_CMD "cd /opt/pfp && set -a && source .env.production 2>/dev/null && set +a && mkdir -p infrastructure/postgres/backups/pre-deploy && docker compose -f docker-compose.production.yml -f docker-compose.stealth.yml exec -T postgres pg_dump -U pfp_user -d pfp_campaign --clean --if-exists --no-owner 2>/dev/null | gzip > infrastructure/postgres/backups/pre-deploy/pfp_pre_deploy_\$(date +%Y-%m-%d_%H%M%S).sql.gz && echo '✅ Backup created'"

          echo "=== Pulling latest code ==="
          $SSH_CMD "cd /opt/pfp && git fetch origin main && git reset --hard origin/main"

          echo "=== Rebuilding and restarting services ==="
          $SSH_CMD "cd /opt/pfp && docker compose -f docker-compose.production.yml -f docker-compose.stealth.yml up -d --build --remove-orphans"

          echo "=== Waiting for services to stabilize ==="
          sleep 30

          echo "=== Running migrations ==="
          $SSH_CMD "cd /opt/pfp && docker compose -f docker-compose.production.yml -f docker-compose.stealth.yml exec -T backend python manage.py migrate --noinput"

          echo "=== Collecting static files ==="
          $SSH_CMD "cd /opt/pfp && docker compose -f docker-compose.production.yml -f docker-compose.stealth.yml exec -T backend python manage.py collectstatic --noinput"

          echo "=== Health check ==="
          HEALTH=$($SSH_CMD "curl -sf --max-time 10 http://localhost:8001/health/simple/ || echo 'FAILED'")
          if [ "$HEALTH" = "FAILED" ]; then
            echo "❌ Health check failed!"
            if [ "$PREV_COMMIT" != "none" ]; then
              echo "=== Rolling back to $PREV_COMMIT ==="
              $SSH_CMD "cd /opt/pfp && git reset --hard $PREV_COMMIT && docker compose -f docker-compose.production.yml -f docker-compose.stealth.yml up -d --build"
            fi
            exit 1
          fi

          echo "✅ Deployment successful!"

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          echo "=== Service status ==="
          $SSH_CMD "cd /opt/pfp && docker compose -f docker-compose.production.yml -f docker-compose.stealth.yml ps --format 'table {{.Name}}\t{{.Status}}'"

          echo "=== Frontend check ==="
          $SSH_CMD "curl -sf --max-time 5 http://localhost:8080 > /dev/null && echo '✅ Frontend OK' || echo '⚠️ Frontend unreachable'"

          echo "=== Backend API check ==="
          $SSH_CMD "curl -sf --max-time 5 http://localhost:8001/health/simple/ && echo ' ✅ Backend OK' || echo '⚠️ Backend unreachable'"

          echo "=== Current commit ==="
          $SSH_CMD "cd /opt/pfp && git log --oneline -1"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          STATUS="${{ job.status == 'success' && '✅ Production deploy successful' || '❌ Production deploy FAILED (auto-rollback attempted)' }}"
          COMMIT=$(git log --oneline -1)
          ACTOR="${{ github.actor }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${STATUS}%0A📌 ${COMMIT}%0A👤 ${ACTOR}%0A🔗 https://peopleforpeace.live" \
            -d parse_mode=HTML || true

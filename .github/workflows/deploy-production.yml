name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.actor == 'mahdifarimani' || github.triggering_actor == 'mahdifarimani'
    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/pfp
            git pull origin main
            
            # Restart docker containers for production
            # Preserves stealth mode explicitly if needed
            docker-compose -f docker-compose.production.yml -f docker-compose.stealth.yml up -d --build
            
            # Apply migrations
            docker exec pfp-backend-1 python manage.py migrate
            docker exec pfp-backend-1 python manage.py collectstatic --noinput
